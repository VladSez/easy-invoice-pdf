name: 🔒 pnpm supply-chain policy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pnpm-policy:
    name: Verify pnpm supply-chain config
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      # we use pinned versions because there are safer to use: https://x.com/paulmillr/status/1900948425325031448
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        name: 🛎️ Checkout repository
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        name: 📚 Setup Node.js
        with:
          node-version: lts/*

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📦 Install pinned package manager from package.json
        run: corepack install

      - name: Verify pnpm supply-chain config
        run: |
          set -euo pipefail
          [[ "$(pnpm config get minimum-release-age)" = "7200" ]] || { echo "❌ minimum-release-age mismatch"; exit 1; }
          [[ "$(pnpm config get block-exotic-subdeps)" = "true" ]] || { echo "❌ block-exotic-subdeps mismatch"; exit 1; }
          [[ "$(pnpm config get trust-policy)" = "no-downgrade" ]] || { echo "❌ trust-policy mismatch"; exit 1; }
          echo "✅ pnpm config values are correct"
